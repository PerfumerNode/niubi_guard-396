version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      app-runtime:
        patterns:
          - '@octokit/*'
          - lucide-react
          - next
          - react
          - react-dom
          - zod
        update-types:
          - minor
          - patch
      dev-tooling:
        patterns:
          - '@types/*'
          - tsx
          - typescript
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - '*'
